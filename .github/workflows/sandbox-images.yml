name: Build Sandbox Images

on:
  push:
    branches: [master]
    paths:
      - "docker/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: worker-sandbox
            context: docker/worker-sandbox
          - image: coding-sandbox
            context: docker/coding-sandbox
          - image: browser-sandbox
            context: docker/browser-sandbox
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/openvort/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/openvort/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
